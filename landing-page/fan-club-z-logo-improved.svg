<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D084;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A86B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>
  
  <!-- Background Circle with subtle shadow -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Fan Club text (smaller, top) -->
  <text x="256" y="200" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="52" 
        font-weight="700" 
        text-anchor="middle" 
        fill="white"
        opacity="0.9"
        style="text-shadow: 0 1px 2px rgba(0,0,0,0.3);">FAN CLUB</text>
  
  <!-- Letter Z (large, center) -->
  <text x="256" y="340" 
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="200" 
        font-weight="900" 
        text-anchor="middle" 
        fill="white"
        style="text-shadow: 0 2px 4px rgba(0,0,0,0.3);">Z</text>
  
  <!-- Subtle highlight ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
</svg>